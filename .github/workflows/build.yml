name: Build and Deploy MuleSoft Application

on:
  pull_request:
    branches:
      - UAT
      - main

  push:
    branches:
      - develop
      - UAT
      - main

env:
  MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Application
        run: mvn clean package -DskipTests

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Deploy DEV
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=DEV \
            -Dtarget=dev-ps \
            -Dapp.name=loyalty-mobile-xapi-dev \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"

  deploy-uat:
    if: github.event_name == 'push' && github.ref == 'refs/heads/UAT'
    needs: build
    runs-on: ubuntu-latest
    environment: UAT

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Deploy UAT
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=UAT \
            -Dtarget=uat-ps \
            -Dapp.name=loyalty-mobile-xapi-uat \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Deploy PROD
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=PROD \
            -Dtarget=prod-ps \
            -Dapp.name=loyalty-mobile-xapi-prod \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"
