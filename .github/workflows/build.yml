name: MuleSoft CI/CD

on:
  push:
    branches:
      - develop
      - UAT
      - main

  pull_request:
    branches:
      - UAT
      - main

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"

jobs:

###############################################################################
# BUILD
###############################################################################

  build:

    name: Build & Publish

    runs-on: ubuntu-latest

    environment: DEV

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      #########################################################################
      # Create Maven settings.xml dynamically
      #########################################################################

      - name: Generate Maven Settings
        run: |

          mkdir -p ~/.m2

          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">

            <servers>

              <server>

                <id>Repository</id>

                <username>~~~Client~~~</username>

                <password>${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}</password>

              </server>

              <server>

                <id>anypoint-exchange-v3</id>

                <username>~~~Client~~~</username>

                <password>${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}</password>

              </server>

            </servers>

          </settings>
          EOF

      #########################################################################
      # Verify Maven
      #########################################################################

      - name: Maven Version
        run: mvn -version

      #########################################################################
      # Build
      #########################################################################

      - name: Build Mule Application
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn clean package \
            -DskipTests \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"

      #########################################################################
      # Publish to Exchange
      #########################################################################

      - name: Publish to Exchange
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -DskipTests \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET" \
            -s ~/.m2/settings.xml

      #########################################################################
      # Upload Artifact
      #########################################################################

      - name: Upload Mule Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-application
          path: target/*.jar

      ###############################################################################
# DEPLOY DEV
###############################################################################

  deploy-dev:

    name: Deploy to DEV

    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    needs: build

    runs-on: ubuntu-latest

    environment: DEV

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-application
          path: target

      - name: Deploy to CloudHub 2 DEV
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=DEV \
            -Dtarget=dev-ps \
            -Dapp.name=loyalty-mobile-xapi-dev \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"

###############################################################################
# DEPLOY UAT
###############################################################################

  deploy-uat:

    name: Deploy to UAT

    if: github.event_name == 'push' && github.ref == 'refs/heads/UAT'

    needs: build

    runs-on: ubuntu-latest

    environment: UAT

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-application
          path: target

      - name: Deploy to CloudHub 2 UAT
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=UAT \
            -Dtarget=uat-ps \
            -Dapp.name=loyalty-mobile-xapi-uat \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"

###############################################################################
# DEPLOY PROD
###############################################################################

  deploy-prod:

    name: Deploy to PROD

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: build

    runs-on: ubuntu-latest

    environment: PROD

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-application
          path: target

      - name: Deploy to CloudHub 2 PROD
        env:
          CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          mvn mule:deploy \
            -Denv=PROD \
            -Dtarget=prod-ps \
            -Dapp.name=loyalty-mobile-xapi-prod \
            -Dclient.id="$CLIENT_ID" \
            -Dclient.secret="$CLIENT_SECRET"    